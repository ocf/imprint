apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wordpress
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: wordpress
  project: imprint
  source:
    path: manifests/wordpress
    repoURL: https://github.com/ocf/imprint.git
    targetRevision: HEAD
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true

