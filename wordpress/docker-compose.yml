services:
  wordpress:
    image: ocf-wordpress-core:latest
    restart: unless-stopped
    environment:
      DB_NAME: test-db
      DB_USER: test-user
      DB_PASSWORD: test-password
      DB_HOST: mariadb
      PRIMARY_URL: http://localhost:8080
    ports:
      - 8080:8080
    volumes:
      - wp-uploads:/share/wordpress/wp-content/uploads
    tmpfs:
      /tmp
    depends_on:
      mariadb:
        condition: service_healthy
        restart: true
  mariadb:
    image: mariadb:latest
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: test-db
      MARIADB_USER: test-user
      MARIADB_PASSWORD: test-password
      MARIADB_RANDOM_ROOT_PASSWORD: '1'
    volumes:
      - db:/var/lib/mysql
    #tmpfs:
    #  /var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
volumes:
  wp-uploads:
  db:
